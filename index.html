<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채팅 정리기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8e8e8;
    --surface: #f4f4f4;
    --surface2: #ececec;
    --border: #d0d0d0;
    --border-strong: #aaaaaa;
    --accent: #1c1c1c;
    --accent-silver: #6b6b6b;
    --accent3: #e8a0b8;   /* pastel pink — merge/select */
    --accent4: #78c99a;   /* pastel green — edit mode */
    --accent-save: #5b8fa8; /* pastel blue — save */
    --text: #1c1c1c;
    --text-dim: #666666;
    --text-muted: #a8a8a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 48px 20px 80px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.018'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .container { width: 100%; max-width: 720px; position: relative; z-index: 1; }

  header { margin-bottom: 48px; text-align: center; }
  .badge {
    display: inline-block; font-family: 'DM Mono', monospace; font-size: 11px;
    letter-spacing: .15em; color: var(--accent); border: 1.5px solid var(--accent);
    padding: 4px 12px; border-radius: 20px; margin-bottom: 20px; text-transform: uppercase;
  }
  h1 { font-size: clamp(28px,5vw,42px); font-weight: 700; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 12px; color: var(--text); }
  h1 span { color: var(--accent-silver); }
  .subtitle { color: var(--text-dim); font-size: 14px; font-weight: 300; }

  /* input */
  .input-section {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 16px; overflow: hidden; margin-bottom: 24px; transition: border-color .2s;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .input-section:focus-within { border-color: var(--accent); }
  .input-label {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .input-label span { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-dim); letter-spacing: .05em; }
  textarea {
    width: 100%; min-height: 200px; background: transparent; border: none; outline: none;
    padding: 20px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 13px; line-height: 1.7; resize: vertical; caret-color: var(--accent);
  }
  textarea::placeholder { color: var(--text-muted); }

  .parse-btn {
    width: 100%; padding: 16px; background: var(--accent); color: #ffffff;
    border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: .02em;
    transition: all .15s ease; margin-bottom: 32px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .parse-btn:hover { background: #333333; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,.22); }
  .parse-btn:active { transform: translateY(0); }

  .output-section { display: none; animation: fadeUp .4s ease forwards; }
  .output-section.visible { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  /* ── toolbar ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
  }
  .toolbar-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .output-title { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text-dim); }

  .speaker-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .speaker-tag { font-size: 11px; font-family: 'DM Mono', monospace; padding: 3px 9px; border-radius: 20px; border: 1px solid; font-weight: 600; }

  /* toolbar buttons */
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  .icon-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(0,0,0,.04); }
  .icon-btn:disabled { opacity: .28; cursor: not-allowed; }

  .pill-btn {
    padding: 6px 13px; border-radius: 8px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    transition: all .15s; white-space: nowrap; border: 1.5px solid;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }

  /* merge btn — pastel pink */
  .merge-btn {
    border-color: rgba(200,120,150,.5); background: rgba(240,168,190,.12); color: #b05070;
    opacity: 0; pointer-events: none; transform: scale(.95);
  }
  .merge-btn.visible { opacity: 1; pointer-events: all; transform: scale(1); transition: all .18s ease; }
  .merge-btn:hover { background: rgba(240,168,190,.28); border-color: rgba(200,120,150,.8); }

  /* edit toggle btn — silver/dark */
  .edit-toggle-btn {
    border-color: rgba(100,100,100,.35); background: rgba(100,100,100,.07); color: var(--accent-silver);
  }
  .edit-toggle-btn:hover { background: rgba(100,100,100,.14); border-color: var(--accent-silver); }
  .edit-toggle-btn.active {
    border-color: #5aaa7a; background: rgba(120,201,154,.15); color: #2e7a52;
    box-shadow: 0 0 0 1px rgba(90,170,120,.25);
  }

  /* save btn — pastel blue */
  .save-btn {
    border-color: rgba(91,143,168,.4); background: rgba(91,143,168,.08); color: #2e6a8a;
  }
  .save-btn:hover { background: rgba(91,143,168,.2); border-color: rgba(91,143,168,.7); }
  .save-btn.saved { border-color: #5b8fa8; color: #2e6a8a; background: rgba(91,143,168,.18); }

  /* edit mode indicator bar */
  .edit-mode-bar {
    display: none; align-items: center; justify-content: space-between;
    gap: 10px; padding: 10px 14px; border-radius: 10px;
    background: rgba(120,201,154,.1); border: 1px solid rgba(90,170,120,.35);
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .edit-mode-bar.visible { display: flex; }
  .edit-mode-bar-text {
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: #2e7a52; display: flex; align-items: center; gap: 7px;
  }
  .edit-pulse {
    width: 7px; height: 7px; border-radius: 50%; background: #4aaa74;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.25; } }

  /* save status */
  .save-status {
    font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
  }
  .save-status.has-save { color: #3e8a6a; }

  /* hint */
  .output-hint {
    font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-muted);
    margin-bottom: 12px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .hint-item { display: flex; align-items: center; gap: 5px; }

  /* chat display */
  .chat-display {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 12px 10px; margin-bottom: 20px;
    max-height: 480px; overflow-y: auto;
    transition: border-color .25s;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .chat-display.edit-mode { border-color: rgba(90,170,120,.5); }
  .chat-display::-webkit-scrollbar { width: 4px; }
  .chat-display::-webkit-scrollbar-track { background: transparent; }
  .chat-display::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* chat block */
  .chat-block {
    position: relative; display: flex; align-items: flex-start; gap: 6px;
    padding: 8px 6px; border-radius: 12px;
    transition: background .12s, box-shadow .12s;
    user-select: none;
  }
  .chat-block.draggable-on { cursor: grab; }
  .chat-block.draggable-on:active { cursor: grabbing; }
  .chat-block:hover  { background: rgba(0,0,0,.03); }
  .chat-block.dragging { opacity: .35; }
  .chat-block.selected {
    background: rgba(220,150,175,.09);
    box-shadow: inset 0 0 0 1px rgba(200,120,150,.3);
  }
  .chat-block.selected:hover { background: rgba(220,150,175,.14); }

  /* drag handle */
  .drag-handle {
    display: flex; flex-direction: column; gap: 3px; padding: 5px 2px;
    opacity: 0; transition: opacity .15s; flex-shrink: 0; margin-top: 17px; cursor: grab;
  }
  .drag-handle span { display: block; width: 14px; height: 2px; background: var(--text-muted); border-radius: 2px; }
  .chat-block.draggable-on:hover .drag-handle { opacity: 1; }

  /* select checkbox */
  .select-check {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--border); background: transparent;
    flex-shrink: 0; margin-top: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; opacity: 0;
  }
  .chat-block:hover .select-check { opacity: 1; }
  .chat-block.selected .select-check { opacity: 1; background: #d08098; border-color: #d08098; }
  .select-check svg { display: none; }
  .chat-block.selected .select-check svg { display: block; }

  /* content */
  .block-content { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .speaker-name { font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600; letter-spacing: .05em; }

  .speaker-name[contenteditable="true"] {
    outline: none; border-bottom: 1px dashed currentColor;
    cursor: text; padding-bottom: 1px;
  }

  .bubble {
    display: inline-block; max-width: 85%; padding: 11px 15px; border-radius: 14px;
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    transition: box-shadow .2s, background .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }

  .bubble[contenteditable="true"] {
    outline: none; cursor: text; max-width: 100%;
    box-shadow: 0 0 0 2px rgba(90,170,120,.5);
    background-color: rgba(120,201,154,.08) !important;
  }
  .bubble[contenteditable="true"]:focus {
    box-shadow: 0 0 0 2.5px rgba(90,170,120,.8), 0 0 12px rgba(90,170,120,.15);
  }

  /* delete btn */
  .delete-btn {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    border: 1px solid rgba(200,80,80,.25); background: rgba(220,100,100,.07); color: #c05050;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    opacity: 0; transition: opacity .15s, background .15s, transform .1s; margin-top: 17px;
  }
  .chat-block:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { background: rgba(220,100,100,.18); transform: scale(1.1); }
  .delete-btn:active { transform: scale(.95); }

  /* drop indicator */
  .drop-indicator {
    height: 2px; background: var(--accent); border-radius: 2px;
    margin: 2px 8px; box-shadow: 0 0 8px rgba(0,0,0,.2);
    opacity: 0; transition: opacity .1s; pointer-events: none;
  }
  .drop-indicator.active { opacity: 1; }

  .sel-count {
    font-size: 10px; font-family: 'DM Mono', monospace;
    background: #d08098; color: #fff;
    border-radius: 10px; padding: 1px 6px; font-weight: 700;
  }

  /* action buttons */
  .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .action-btn {
    padding: 14px; border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--surface); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
  }
  .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .action-btn.success { border-color: #4aaa74; color: #2e7a52; background: rgba(120,201,154,.12); }

  /* saved session banner */
  .restore-banner {
    display: none; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-radius: 12px;
    background: rgba(91,143,168,.08); border: 1px solid rgba(91,143,168,.35);
    margin-bottom: 20px; gap: 10px; flex-wrap: wrap;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .restore-banner.visible { display: flex; }
  .restore-banner-text { font-size: 13px; color: #2e6a8a; display: flex; align-items: center; gap: 8px; font-weight: 600; }
  .restore-banner-text span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); font-weight: 400; }
  .restore-actions { display: flex; gap: 8px; }
  .restore-yes, .restore-no {
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all .15s;
  }
  .restore-yes { background: var(--accent); color: #fff; border: none; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  .restore-yes:hover { background: #333; }
  .restore-no  { background: transparent; border: 1.5px solid var(--border); color: var(--text-dim); }
  .restore-no:hover  { border-color: #c05050; color: #c05050; }

  .error-msg {
    background: rgba(220,80,80,.08); border: 1px solid rgba(200,80,80,.3); border-radius: 12px;
    padding: 16px 20px; color: #b04040; font-size: 14px; margin-top: 12px;
    display: none; white-space: pre-line;
  }

  @keyframes blockOut {
    0%   { opacity:1; max-height:200px; }
    100% { opacity:0; max-height:0; padding-top:0; padding-bottom:0; margin:0; }
  }
  .chat-block.deleting { overflow:hidden; animation: blockOut .22s ease forwards; }

  /* ── Left / Right alignment ── */
  .chat-block.align-right {
    flex-direction: row-reverse;
  }
  .chat-block.align-right .block-content {
    align-items: flex-end;
  }
  .chat-block.align-right .speaker-name {
    text-align: right;
  }
  .chat-block.align-right .bubble {
    border-radius: 14px 4px 14px 14px;
  }
  .chat-block.align-left .bubble {
    border-radius: 4px 14px 14px 14px;
  }
  /* drag handle & delete btn stay accessible on both sides */
  .chat-block.align-right .drag-handle { order: 10; }
  .chat-block.align-right .delete-btn  { order: -1; margin-top: 17px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">KakaoTalk Parser</div>
    <h1>채팅 기록<span> 정리기</span></h1>
    <p class="subtitle">붙여넣기만 하면 깔끔하게 정리돼요</p>
  </header>

  <!-- Restore banner (shown if localStorage has data) -->
  <div class="restore-banner" id="restoreBanner">
    <div class="restore-banner-text">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      임시 저장된 채팅 내역이 있어요
      <span id="savedTimeLabel"></span>
    </div>
    <div class="restore-actions">
      <button class="restore-yes" onclick="restoreSave()">불러오기</button>
      <button class="restore-no"  onclick="dismissRestore()">무시</button>
    </div>
  </div>

  <div class="input-section">
    <div class="input-label"><div class="dot"></div><span>카카오톡 채팅 원문</span></div>
    <textarea id="rawInput" placeholder="카카오톡 채팅 내역을 여기에 붙여넣으세요.

예시)
2026년 03월 06일 오후 8:00, A : I’m always getting your back
2026년 03월 06일 오후 8:00, B : But now you got to grip the trigger></textarea>
  </div>

  <button class="parse-btn" onclick="parseChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    채팅 정리하기
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="output-section" id="outputSection">

    <!-- toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="output-title">정리된 채팅</div>
        <div class="speaker-tags" id="speakerTags"></div>
      </div>
      <div class="toolbar-right">
        <button class="merge-btn pill-btn" id="mergeBtn" onclick="mergeSelected()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 6H21M8 12H21M8 18H21M3 6h.01M3 12h.01M3 18h.01"/></svg>
          텍스트 통합
          <span class="sel-count" id="selCount">0</span>
        </button>

        <!-- edit toggle -->
        <button class="edit-toggle-btn pill-btn" id="editToggleBtn" onclick="toggleEditMode()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="editBtnIcon"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span id="editBtnLabel">내용 수정</span>
        </button>

        <!-- save -->
        <button class="save-btn pill-btn" id="saveBtn" onclick="saveToLocal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          임시 저장
        </button>

        <!-- undo / redo -->
        <button class="icon-btn" id="undoBtn" onclick="undo()" title="실행 취소 (Ctrl+Z)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 10h10a5 5 0 010 10H9"/><polyline points="3 4 3 10 9 10"/></svg>
        </button>
        <button class="icon-btn" id="redoBtn" onclick="redo()" title="다시 실행 (Ctrl+Y)" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10H11a5 5 0 000 10h4"/><polyline points="21 4 21 10 15 10"/></svg>
        </button>
      </div>
    </div>

    <!-- edit mode active bar -->
    <div class="edit-mode-bar" id="editModeBar">
      <div class="edit-mode-bar-text">
        <div class="edit-pulse"></div>
        내용 수정 모드 활성화 — 이름과 텍스트를 직접 클릭해서 편집하세요
      </div>
      <div class="save-status" id="saveStatus">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="saveStatusText">저장 안 됨</span>
      </div>
    </div>

    <!-- hints -->
    <div class="output-hint">
      <span class="hint-item">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        드래그로 순서 변경
      </span>
      <span class="hint-item">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        클릭으로 선택 → 통합
      </span>
      <span class="hint-item">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        호버 후 ✕로 삭제
      </span>
    </div>

    <div class="chat-display" id="chatDisplay"></div>

    <div class="action-buttons">
      <button class="action-btn" id="copyBtn" onclick="copyText()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        텍스트 복사
      </button>
      <button class="action-btn" onclick="downloadTxt()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        TXT 다운로드
      </button>
    </div>
  </div>

</div>
<script>
/* ═══════════════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════════════ */
const COLORS    = ['#7a9abf','#c47a9a','#8fba8a','#c49a5a','#9a82c4','#5aabab'];
const BG_COLORS = ['rgba(122,154,191,0.13)','rgba(196,122,154,0.13)','rgba(143,186,138,0.13)','rgba(196,154,90,0.13)','rgba(154,130,196,0.13)','rgba(90,171,171,0.13)'];
const LS_KEY    = 'chatParser_v1';

let speakerColorMap = {};
let chatData        = [];
let selectedIdxs    = new Set();
let editMode        = false;

let undoStack = [];
let redoStack = [];

/* ═══════════════════════════════════════════
   HISTORY
═══════════════════════════════════════════ */
function snapshot() { return JSON.parse(JSON.stringify(chatData)); }

function pushHistory() {
  undoStack.push(snapshot());
  redoStack = [];
  updateHistoryBtns();
}

function updateHistoryBtns() {
  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  chatData = undoStack.pop();
  selectedIdxs.clear();
  renderChat(); updateHistoryBtns(); updateMergeBtn();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  chatData = redoStack.pop();
  selectedIdxs.clear();
  renderChat(); updateHistoryBtns(); updateMergeBtn();
}

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  const isEditable = document.activeElement.isContentEditable;
  if (tag === 'TEXTAREA' || tag === 'INPUT' || isEditable) return;
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
});

/* ═══════════════════════════════════════════
   EDIT MODE
═══════════════════════════════════════════ */
function toggleEditMode() {
  // If turning OFF, sync contenteditable values back to chatData first
  if (editMode) {
    syncEditableContent();
  }

  editMode = !editMode;
  const btn   = document.getElementById('editToggleBtn');
  const bar   = document.getElementById('editModeBar');
  const label = document.getElementById('editBtnLabel');
  const disp  = document.getElementById('chatDisplay');

  if (editMode) {
    btn.classList.add('active');
    label.textContent = '수정 완료';
    bar.classList.add('visible');
    disp.classList.add('edit-mode');
  } else {
    btn.classList.remove('active');
    label.textContent = '내용 수정';
    bar.classList.remove('visible');
    disp.classList.remove('edit-mode');
  }

  renderChat();
}

// Read contenteditable text back into chatData
function syncEditableContent() {
  const display = document.getElementById('chatDisplay');
  const blocks  = display.querySelectorAll('.chat-block[data-idx]');
  blocks.forEach(block => {
    const idx    = parseInt(block.dataset.idx);
    const nameEl   = block.querySelector('.speaker-name');
    const bubbleEl = block.querySelector('.bubble');
    if (!chatData[idx]) return;
    if (nameEl   && nameEl.isContentEditable)   chatData[idx].speaker = nameEl.innerText.trim();
    if (bubbleEl && bubbleEl.isContentEditable) chatData[idx].text    = bubbleEl.innerText.trim();
  });
  // Rebuild color map in case speaker names changed
  const speakers = [...new Set(chatData.map(d => d.speaker))];
  speakers.forEach((s, i) => {
    if (speakerColorMap[s] === undefined) speakerColorMap[s] = i % COLORS.length;
  });
  renderSpeakerTags();
}

/* ═══════════════════════════════════════════
   LOCAL STORAGE — SAVE / RESTORE
═══════════════════════════════════════════ */
function saveToLocal() {
  if (!chatData.length) return;
  const payload = {
    chatData,
    speakerColorMap,
    savedAt: Date.now()
  };
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
    const btn = document.getElementById('saveBtn');
    btn.classList.add('saved');
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 저장됨!`;
    updateSaveStatus(payload.savedAt);
    setTimeout(() => {
      btn.classList.remove('saved');
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 임시 저장`;
    }, 2000);
  } catch(e) { console.warn('localStorage save failed', e); }
}

function updateSaveStatus(ts) {
  const el  = document.getElementById('saveStatus');
  const txt = document.getElementById('saveStatusText');
  if (!ts) return;
  const d   = new Date(ts);
  const hh  = String(d.getHours()).padStart(2,'0');
  const mm  = String(d.getMinutes()).padStart(2,'0');
  const ss  = String(d.getSeconds()).padStart(2,'0');
  txt.textContent = `마지막 저장 ${hh}:${mm}:${ss}`;
  el.classList.add('has-save');
}

function checkForSave() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const payload = JSON.parse(raw);
    if (!payload.chatData?.length) return;
    const banner = document.getElementById('restoreBanner');
    const label  = document.getElementById('savedTimeLabel');
    const d = new Date(payload.savedAt);
    const dateStr = `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    label.textContent = `(${dateStr} 저장)`;
    banner.classList.add('visible');
  } catch(e) {}
}

function restoreSave() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const payload = JSON.parse(raw);
    chatData        = payload.chatData;
    speakerColorMap = payload.speakerColorMap || {};

    // Ensure all speakers have a color
    const speakers = [...new Set(chatData.map(d => d.speaker))];
    speakers.forEach((s, i) => {
      if (speakerColorMap[s] === undefined) speakerColorMap[s] = i % COLORS.length;
    });

    selectedIdxs.clear();
    undoStack = []; redoStack = [];
    updateHistoryBtns(); updateMergeBtn();
    renderSpeakerTags(speakers);
    renderChat();
    document.getElementById('outputSection').classList.add('visible');
    document.getElementById('restoreBanner').classList.remove('visible');
    updateSaveStatus(payload.savedAt);
  } catch(e) { console.warn('restore failed', e); }
}

function dismissRestore() {
  document.getElementById('restoreBanner').classList.remove('visible');
}

/* ═══════════════════════════════════════════
   PARSE
═══════════════════════════════════════════ */
function parseChat() {
  const raw = document.getElementById('rawInput').value.trim();
  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';
  if (!raw) { showError('채팅 내역을 붙여넣어 주세요.'); return; }

  const lineRegex = /^.+?,\s*(.+?)\s*:\s*(.+)$/;
  const messages = [];
  for (const line of raw.split('\n')) {
    const t = line.trim(); if (!t) continue;
    const m = t.match(lineRegex);
    if (m) messages.push({ speaker: m[1].trim(), text: m[2].trim() });
  }

  if (!messages.length) {
    showError('카카오톡 채팅 형식을 인식할 수 없어요.\n예: 2025년 12월 21일 오후 8:07, 이름 : 메시지');
    return;
  }

  const grouped = [];
  for (const msg of messages) {
    if (grouped.length && grouped[grouped.length-1].speaker === msg.speaker)
      grouped[grouped.length-1].texts.push(msg.text);
    else grouped.push({ speaker: msg.speaker, texts: [msg.text] });
  }

  const speakers = [...new Set(grouped.map(g => g.speaker))];
  speakerColorMap = {};
  speakers.forEach((s, i) => { speakerColorMap[s] = i % COLORS.length; });

  chatData = grouped.map(g => ({ speaker: g.speaker, text: mergeTexts(g.texts) }));
  selectedIdxs.clear(); undoStack = []; redoStack = [];

  // Turn off edit mode if it was on
  if (editMode) toggleEditMode();

  updateHistoryBtns(); updateMergeBtn();
  renderSpeakerTags(speakers);
  renderChat();
  document.getElementById('outputSection').classList.add('visible');
  document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function mergeTexts(texts) {
  const cleaned = texts.map(t => t.trim()).filter(Boolean);
  const merged = []; let buf = [];
  for (const t of cleaned) {
    if (/^[ㅋㅎ]+$/.test(t)) buf.push(t);
    else {
      if (buf.length) { merged.push(collapseLaughs(buf)); buf = []; }
      merged.push(t);
    }
  }
  if (buf.length) merged.push(collapseLaughs(buf));
  return merged.join(' ');
}
function collapseLaughs(arr) {
  return arr.join('').replace(/(.)\1+/g, (_, c) => c.repeat(Math.min(_.length, 5)));
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderSpeakerTags(speakers) {
  const el = document.getElementById('speakerTags'); el.innerHTML = '';
  (speakers || [...new Set(chatData.map(d => d.speaker))]).forEach(s => {
    const ci  = speakerColorMap[s] ?? 0; const col = COLORS[ci];
    const tag = document.createElement('div');
    tag.className = 'speaker-tag';
    tag.style.color = col; tag.style.borderColor = col+'55'; tag.style.background = col+'11';
    tag.textContent = s; el.appendChild(tag);
  });
}

function renderChat() {
  const display = document.getElementById('chatDisplay');
  display.innerHTML = '';
  if (editMode) display.classList.add('edit-mode');
  else          display.classList.remove('edit-mode');

  chatData.forEach((item, idx) => {
    const ci    = speakerColorMap[item.speaker] ?? 0;
    const color = COLORS[ci];
    const bg    = BG_COLORS[ci];
    const isSel = selectedIdxs.has(idx);

    display.appendChild(makeIndicator(idx));

    const block = document.createElement('div');
    // Determine left/right alignment based on speaker order
    const speakerOrder = [...new Set(chatData.map(d => d.speaker))];
    const isRight = speakerOrder.length >= 2 && item.speaker === speakerOrder[1];

    let cls = 'chat-block';
    cls += isRight ? ' align-right' : ' align-left';
    if (isSel) cls += ' selected';
    if (!editMode) cls += ' draggable-on';
    block.className   = cls;
    block.draggable   = !editMode;
    block.dataset.idx = idx;

    // drag handle (hidden in edit mode)
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '<span></span><span></span><span></span>';
    if (editMode) handle.style.display = 'none';

    // select checkbox (hidden in edit mode)
    const chk = document.createElement('div');
    chk.className = 'select-check';
    chk.title = '선택';
    chk.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#1a1000" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    if (editMode) chk.style.display = 'none';
    else chk.addEventListener('click', e => { e.stopPropagation(); toggleSelect(idx); });

    // content
    const content = document.createElement('div');
    content.className = 'block-content';

    const name = document.createElement('div');
    name.className = 'speaker-name'; name.style.color = color;
    name.textContent = item.speaker;
    if (editMode) {
      name.contentEditable = 'true';
      name.title = '화자 이름 수정';
      // On blur, update chatData immediately for live sync
      name.addEventListener('blur', () => {
        const newName = name.innerText.trim();
        if (newName && newName !== chatData[idx].speaker) {
          pushHistory();
          chatData[idx].speaker = newName;
          if (speakerColorMap[newName] === undefined) {
            speakerColorMap[newName] = Object.keys(speakerColorMap).length % COLORS.length;
          }
          renderSpeakerTags();
        }
      });
      name.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); name.blur(); } });
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.background = bg; bubble.style.border = `1px solid ${color}28`;
    bubble.textContent = item.text;
    if (editMode) {
      bubble.contentEditable = 'true';
      bubble.title = '내용 수정';
      bubble.addEventListener('blur', () => {
        const newText = bubble.innerText.trim();
        if (newText !== chatData[idx].text) {
          pushHistory();
          chatData[idx].text = newText;
        }
      });
    }

    content.appendChild(name); content.appendChild(bubble);

    // delete btn
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn'; delBtn.title = '삭제';
    delBtn.innerHTML = `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    delBtn.addEventListener('click', e => { e.stopPropagation(); deleteBlock(idx); });

    block.appendChild(handle);
    block.appendChild(chk);
    block.appendChild(content);
    block.appendChild(delBtn);

    // click to select (only in non-edit mode)
    if (!editMode) {
      block.addEventListener('click', e => {
        if (e.target === delBtn || delBtn.contains(e.target)) return;
        if (e.target === chk  || chk.contains(e.target))  return;
        toggleSelect(idx);
      });
      block.addEventListener('dragstart', onDragStart);
      block.addEventListener('dragend',   onDragEnd);
    }

    display.appendChild(block);
  });

  display.appendChild(makeIndicator(chatData.length));

  if (!editMode) {
    display.ondragover  = onDragOver;
    display.ondragleave = onDragLeave;
    display.ondrop      = onDrop;
  } else {
    display.ondragover = display.ondragleave = display.ondrop = null;
  }
}

function makeIndicator(beforeIdx) {
  const el = document.createElement('div');
  el.className = 'drop-indicator'; el.dataset.before = beforeIdx;
  return el;
}

/* ═══════════════════════════════════════════
   SELECTION & MERGE
═══════════════════════════════════════════ */
function toggleSelect(idx) {
  if (selectedIdxs.has(idx)) selectedIdxs.delete(idx);
  else selectedIdxs.add(idx);
  updateMergeBtn(); renderChat();
}

function updateMergeBtn() {
  const btn = document.getElementById('mergeBtn');
  const cnt = document.getElementById('selCount');
  const n   = selectedIdxs.size;
  cnt.textContent = n;
  if (n >= 2) btn.classList.add('visible');
  else        btn.classList.remove('visible');
}

function mergeSelected() {
  if (selectedIdxs.size < 2) return;
  pushHistory();
  const sorted = [...selectedIdxs].sort((a, b) => a - b);
  const first  = sorted[0];
  const baseSpeaker = chatData[first].speaker;
  const mergedText  = sorted.map(i => chatData[i].text).join(' ');
  for (let i = sorted.length - 1; i >= 0; i--) chatData.splice(sorted[i], 1);
  chatData.splice(first, 0, { speaker: baseSpeaker, text: mergedText });
  selectedIdxs.clear(); updateMergeBtn(); renderChat();
}

/* ═══════════════════════════════════════════
   DELETE
═══════════════════════════════════════════ */
function deleteBlock(idx) {
  pushHistory();
  const display = document.getElementById('chatDisplay');
  const blockEl = display.querySelector(`.chat-block[data-idx="${idx}"]`);
  if (!blockEl) return;
  selectedIdxs.delete(idx); updateMergeBtn();
  blockEl.classList.add('deleting');
  blockEl.addEventListener('animationend', () => {
    chatData.splice(idx, 1); renderChat();
  }, { once: true });
}

/* ═══════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════ */
let dragSrcIdx = null;

function onDragStart(e) {
  dragSrcIdx = parseInt(this.dataset.idx);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(dragSrcIdx));
}
function onDragEnd() {
  this.classList.remove('dragging'); clearIndicators(); dragSrcIdx = null;
}
function onDragOver(e) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  clearIndicators();
  const ind = closestIndicator(e.clientY); if (ind) ind.classList.add('active');
}
function onDragLeave(e) { if (!this.contains(e.relatedTarget)) clearIndicators(); }
function onDrop(e) {
  e.preventDefault(); clearIndicators();
  if (dragSrcIdx === null) return;
  const ind = closestIndicator(e.clientY); if (!ind) return;
  let targetIdx = parseInt(ind.dataset.before);
  if (targetIdx > dragSrcIdx) targetIdx--;
  if (targetIdx === dragSrcIdx) return;
  pushHistory();
  const [moved] = chatData.splice(dragSrcIdx, 1);
  chatData.splice(targetIdx, 0, moved);
  renderChat();
}
function closestIndicator(clientY) {
  const all = [...document.querySelectorAll('.drop-indicator')];
  let best = null, minD = Infinity;
  for (const el of all) {
    const r = el.getBoundingClientRect();
    const d = Math.abs(clientY - (r.top + r.height / 2));
    if (d < minD) { minD = d; best = el; }
  }
  return best;
}
function clearIndicators() { document.querySelectorAll('.drop-indicator.active').forEach(el => el.classList.remove('active')); }

/* ═══════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════ */
function buildText() { return chatData.map(d => `${d.speaker}: ${d.text}`).join('\n\n'); }

function copyText() {
  const text = buildText(); if (!text) return;

  function onSuccess() {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('success');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 복사됐어요!`;
    setTimeout(() => {
      btn.classList.remove('success');
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 텍스트 복사`;
    }, 2200);
  }

  function fallbackCopy() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); onSuccess(); }
    catch(e) { alert('복사에 실패했어요. 텍스트를 직접 선택해서 복사해주세요.'); }
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
}

function downloadTxt() {
  const text = buildText(); if (!text) return;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = '정리된_채팅.txt'; a.click();
  URL.revokeObjectURL(url);
}

function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
checkForSave();
</script>
</body>
</html>
